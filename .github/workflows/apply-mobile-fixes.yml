name: Apply mobile fixes
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/apply-mobile-fixes.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text()
          css='''\n:root{--wa:#25D366}\n.wa-dot::before{content:"";width:8px;height:8px;border-radius:999px;background:var(--wa);display:inline-block;margin-right:2px;box-shadow:0 0 0 5px rgba(37,211,102,.12)}\n@media(max-width:640px){body{padding-bottom:118px!important}.section{padding:52px 0!important}.hero h1{font-size:38px!important;line-height:.99!important}.title{font-size:32px!important;line-height:1.04!important}.lead{font-size:15.5px!important;line-height:1.6!important}.hero-side{opacity:1!important;transform:none!important;display:flex!important;gap:14px!important;padding:4px 0 36px!important}.photo-card{display:block!important;width:100%!important;max-width:360px!important;min-height:420px!important;aspect-ratio:auto!important;margin:0 auto 12px!important;border-radius:24px!important}.photo-card img{display:block!important;opacity:1!important}.impact-grid{grid-template-columns:1fr 1fr!important;gap:10px!important}.impact-card{padding:18px!important;border-radius:18px!important}.impact-card span{font-size:20px!important;margin-bottom:8px!important}.impact-card p{font-size:13px!important;line-height:1.35!important}.mobile-sticky{left:14px!important;right:14px!important;bottom:10px!important;gap:8px!important}.mobile-sticky a{min-height:48px!important;font-size:9px!important;box-shadow:0 12px 30px rgba(23,35,29,.2)!important}}\n'''
          if '.wa-dot::before' not in s:
              s=s.replace('</style>',css+'</style>')
          s=s.replace('<div class="hero-side reveal">','<div class="hero-side">')
          s=s.replace('class="nav-cta"','class="nav-cta wa-dot"')
          s=s.replace('class="btn btn-primary" href="https://wa.me/','class="btn btn-primary wa-dot" href="https://wa.me/')
          s=s.replace('class="sticky-wa"','class="sticky-wa wa-dot"')
          p.write_text(s)
          PY
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.html
          git diff --cached --quiet || git commit -m "Ajustar responsive móvil de la landing"
          git push
